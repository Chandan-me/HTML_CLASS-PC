<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>
</head>
<body style="text-align:center; background:#73a073; font-family:serif;">


<form>
    <fieldset>
        <legend><b>Login</b></legend>
        <br>
<label>First Name:</label><br>
<input type="text" placeholder="Enter your first name"><br><br>

<label>Last Name:</label><br>
<input type="text" placeholder="Enter your last name"><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Enter your email"><br><br>

<label>Subject:</label><br>
<input type="text" placeholder="Enter subject"><br><br>

<label>Message:</label><br>
<textarea rows="6" cols="30" placeholder="Enter your message"></textarea><br><br>

<button type="submit">Submit</button>
</fieldset>

<br><br>

<!-- LOGIN FORM -->

    <fieldset>
        <legend><b>Login Form</b></legend>
        <br>
<label>Email:</label><br>
<input type="email" placeholder="Enter email"><br><br>

<label>Password:</label><br>
<input type="password" placeholder="Enter password"><br><br>

<button type="submit">Login</button>
</fieldset>


<br><br>


    <fieldset>
        <legend>Forget Password</legend>
<label>Enter your email:</label><br>
<input type="email" placeholder="Enter registered email"><br><br>

<label>Enter your phone:</label><br>
<input type="text" placeholder="Enter registered phone"><br><br>

<label>Enter your password:</label><br>
<input type="password" placeholder="Enter password"><br><br>

<label>Enter your confirm password:</label><br>
<input type="password" placeholder="Enter confirm password"><br><br>

<button type="submit">Reset Password</button>
</fieldset>
</form>

</body>
</html>
